<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST DAY 🎉 - Infra Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 40px;
            text-align: center;
        }
        
        .emoji {
            font-size: 8em;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #333;
        }
        
        p {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .time-range {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            font-size: 1.1em;
        }
        
        .time-range strong {
            color: #667eea;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🏖️</div>
        <h1>REST DAY!</h1>
        <p>今天没有新的 commits</p>
        <p>大家都在休息，享受宁静的一天吧~</p>
        
        <div class="time-range">
            <p>监控时间范围:</p>
            <p><strong>从: 2026-01-01 00:00</strong></p>
            <p><strong>到: 2026-03-08 11:39</strong></p>
        </div>
        
        <p>监控的仓库都在保持稳定运行 ✅</p>
        
        <div class="footer">
            <p>⚡ Powered by DeepSeek AI | 🔄 下次更新: 2天后</p>
        </div>
    </div>
</body>
</html>
