name: Infra Daily Monitor

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dateutil
    
    - name: Create required directories
      run: mkdir -p repos data reports
    
    - name: Run monitor script
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python monitor.py
    
    - name: Generate HTML report
      run: |
        python generate_html.py
    
    - name: Show reports
      run: ls -la reports/
    
    - name: Commit and push reports
      run: |
        git config --local user.email "ttaohe828@gmail.com"
        git config --local user.name "ttaohe"
        git add reports/ || true
        git commit -m "chore: update daily report $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: report-${{ github.run_number }}
        path: reports/
        retention-days: 30
