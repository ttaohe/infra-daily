name: Infra Daily Monitor

on:
  schedule:
    # 每 2 天运行一次 (UTC 0:00 = 北京时间 8:00)
    - cron: "0 0 */2 * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'  # 缓存 pip 依赖
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install requests python-dateutil
    
    - name: Create directories
      run: |
        mkdir -p repos data reports
    
    - name: Run GitHub Monitor
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python3 monitor.py
    
    - name: Generate HTML Report
      run: |
        python3 generate_html.py
    
    - name: List reports
      run: |
        ls -la reports/
    
    - name: Upload reports as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: infra-daily-report-${{ github.run_number }}
        path: reports/
        retention-days: 30
    
    - name: Commit and push reports
      run: |
        git config --local user.email "ttaohe828@gmail.com"
        git config --local user.name "ttaohe"
        git add reports/ || true
        git commit -m "chore: update daily report $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
